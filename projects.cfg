[yso-tfidf-en]
name=YSO TFIDF project
language=en
backend=tfidf
vocab=yso
analyzer=snowball(english)

[yso-mllm-en]
name=YSO MLLM project
language=en
backend=mllm
vocab=yso
analyzer=snowball(english)

[yso-omikuji-parabel-en]
name = Omikuji Parabel English
language = en
backend = omikuji
analyzer = snowball(english)
vocab = yso

[yso-nn_ensemble-en]
name=YSO neural ensemble project
language=en
backend=nn_ensemble
vocab=yso
sources=yso-tfidf-en,yso-mllm-en,yso-omikuji-parabel-en
nodes=100
dropout_rate=0.2
epochs=10
